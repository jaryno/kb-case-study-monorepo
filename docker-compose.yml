services:
  postgres:
    image: postgres:17-alpine
    container_name: bookbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookbot
      POSTGRES_PASSWORD: bookbot
      POSTGRES_DB: bookbot
    ports:
      - "5432:5432"
    volumes:
      - bookbot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bookbot_postgres_data:
